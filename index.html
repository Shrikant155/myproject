<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terraform EC2 Server</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#4facfe,#00f2fe);
    }

    .container{
      background:white;
      width:500px;
      padding:40px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    h1{
      color:#333;
      margin-bottom:20px;
      font-size:36px;
    }

    p{
      color:#555;
      font-size:18px;
      margin-bottom:15px;
    }

    .status{
      display:inline-block;
      padding:10px 20px;
      background:#28a745;
      color:white;
      border-radius:30px;
      font-weight:bold;
      margin-top:20px;
    }

    .footer{
      margin-top:30px;
      font-size:14px;
      color:gray;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🚀 NGINX Server Running</h1>

    <p>EC2 Instance Created Using Terraform</p>

    <p>Welcome to your DevOps Practice Server</p>

    <div class="status">
      ACTIVE
    </div>

    <div class="footer">
      AWS + Terraform + NGINX
    </div>
  </div>

</body>
</html>
